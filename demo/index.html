<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Usage Card Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --primary-text-color: #e7f3fb;
        --secondary-text-color: #9fb4c6;
        --card-background-color: #111923;
        --divider-color: rgba(148, 176, 200, .24);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050b11;
        color: var(--primary-text-color);
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(rgba(5, 11, 17, .84), rgba(5, 11, 17, .94)),
          radial-gradient(circle at 76% 18%, rgba(71, 231, 211, .16), transparent 27%),
          radial-gradient(circle at 12% 90%, rgba(108, 92, 255, .12), transparent 29%),
          #050b11;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: minmax(0, 1fr) 360px;
        gap: 18px;
        align-items: start;
      }

      .surface {
        border: 1px solid rgba(168, 221, 255, .16);
        border-radius: 8px;
        background: rgba(10, 18, 27, .72);
        padding: 14px;
      }

      .dashboard {
        min-height: 100vh;
        display: grid;
        align-content: start;
        padding-top: 22px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 14px;
        color: var(--secondary-text-color);
        font-size: 13px;
        line-height: 1.45;
      }

      @media (max-width: 880px) {
        body { display: block; padding: 16px 0; }
        main { grid-template-columns: minmax(0, 1fr); }
        .dashboard { min-height: 0; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="dashboard">
        <ai-usage-card id="card"></ai-usage-card>
      </section>
      <aside class="surface">
        <h1>Visual editor preview</h1>
        <p>Toggles update the card config using the Lovelace editor event.</p>
        <ai-usage-card-editor id="editor"></ai-usage-card-editor>
      </aside>
    </main>

    <script type="module">
      import { AiUsageCard, createPresetModel } from "../ai-usage-card.js";

      customElements.define("ha-card", class extends HTMLElement {});

      const config = {
        title: "AI Usage",
        subtitle: "Allowance remaining",
        width: "62.5%",
        max_width: "62.5%",
        align: "left",
        show_status: true,
        // The old code checked for 'models' property when it was edited, so use models.
        models: [
          createPresetModel("gemini"),
          createPresetModel("claude"),
          createPresetModel("codex"),
          createPresetModel("grok")
        ],
      };

      const hass = {
        states: {
          "sensor.ai_allowance_monitor_agy_gemini_5h_remaining": { state: "100.0" },
          "sensor.ai_allowance_monitor_agy_gemini_5h_reset": { state: "2026-06-19T21:35:07+00:00" },
          "sensor.ai_allowance_monitor_agy_gemini_weekly_remaining": { state: "100.0" },
          "sensor.ai_allowance_monitor_agy_gemini_weekly_reset": { state: "2026-06-19T21:35:07+00:00" },
          "sensor.ai_allowance_monitor_agy_gemini_status": { state: "ok" },

          "sensor.ai_allowance_monitor_claude_5h_remaining": { state: "100.0" },
          "sensor.ai_allowance_monitor_claude_5h_reset": { state: "2026-06-19T21:35:07+00:00" },
          "sensor.ai_allowance_monitor_claude_weekly_remaining": { state: "99.51" },
          "sensor.ai_allowance_monitor_claude_weekly_reset": { state: "2026-06-26T02:00:07+00:00" },
          "sensor.ai_allowance_monitor_claude_status": { state: "auth_required" },

          "sensor.ai_allowance_monitor_codex_gpt_5h_remaining": { state: "98.0" },
          "sensor.ai_allowance_monitor_codex_gpt_5h_reset": { state: "2026-06-20T00:15:42+00:00" },
          "sensor.ai_allowance_monitor_codex_gpt_weekly_remaining": { state: "73.0" },
          "sensor.ai_allowance_monitor_codex_gpt_weekly_reset": { state: "2026-06-24T21:18:14+00:00" },
          "sensor.ai_allowance_monitor_codex_gpt_status": { state: "error" },
          
          "sensor.ai_allowance_monitor_grok_5h_remaining": { state: "50.0" },
          "sensor.ai_allowance_monitor_grok_5h_reset": { state: "2026-06-20T00:15:42+00:00" },
          "sensor.ai_allowance_monitor_grok_weekly_remaining": { state: "25.0" },
          "sensor.ai_allowance_monitor_grok_weekly_reset": { state: "2026-06-24T21:18:14+00:00" },
          "sensor.ai_allowance_monitor_grok_status": { state: "unknown" },
        },
      };

      const card = document.querySelector("#card");
      const editor = document.querySelector("#editor");

      function applyConfig(nextConfig) {
        card.setConfig(nextConfig);
        card.hass = hass;
        editor.setConfig(nextConfig);
      }

      editor.addEventListener("config-changed", (event) => applyConfig(event.detail.config));
      applyConfig(config);

      window.demoCard = { card, editor, hass, config, AiUsageCard };
    </script>
  </body>
</html>
