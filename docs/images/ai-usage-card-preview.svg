<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI Usage Banner Card preview</title>
  <desc id="desc">A dark Home Assistant card with Gemini, Claude, and Codex allowance rows showing 5-hour and weekly usage bars.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050b11"/>
      <stop offset="1" stop-color="#0d1723"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061017"/>
      <stop offset=".62" stop-color="#10283a"/>
      <stop offset="1" stop-color="#07111a"/>
    </linearGradient>
    <radialGradient id="glowA" cx=".86" cy=".08" r=".36">
      <stop offset="0" stop-color="#7e5bff" stop-opacity=".24"/>
      <stop offset="1" stop-color="#7e5bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx=".74" cy=".52" r=".34">
      <stop offset="0" stop-color="#2ef2db" stop-opacity=".2"/>
      <stop offset="1" stop-color="#2ef2db" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="url(#page)"/>
  <g filter="url(#shadow)">
    <rect x="82" y="70" width="750" height="432" rx="10" fill="url(#card)"/>
    <rect x="82" y="70" width="750" height="432" rx="10" fill="url(#glowA)"/>
    <rect x="82" y="70" width="750" height="432" rx="10" fill="url(#glowB)"/>
    <text x="110" y="110" fill="#9fd5df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">ALLOWANCE REMAINING</text>
    <text x="110" y="140" fill="#ddf7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="600">AI Usage</text>

    <g transform="translate(110 166)">
      <rect width="694" height="96" rx="12" fill="#08141e" fill-opacity=".78" stroke="#9fe0ff" stroke-opacity=".42"/>
      <circle cx="34" cy="48" r="18" fill="#54f2ef" fill-opacity=".18" stroke="#54f2ef"/>
      <text x="25" y="54" fill="#54f2ef" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">G</text>
      <text x="70" y="54" fill="#f0fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="600">GEMINI</text>
      <text x="216" y="31" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">5h remaining</text>
      <text x="542" y="31" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">100%</text>
      <rect x="216" y="40" width="362" height="18" rx="6" fill="#071b25" stroke="#54f2ef"/>
      <rect x="218" y="42" width="358" height="14" rx="5" fill="#54f2ef" fill-opacity=".36"/>
      <text x="600" y="31" fill="#9fd5df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">5H RESET</text>
      <text x="600" y="54" fill="#f0fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">now</text>
      <text x="216" y="75" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Weekly remaining</text>
      <text x="542" y="75" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">100%</text>
    </g>

    <g transform="translate(110 276)">
      <rect width="694" height="96" rx="12" fill="#08141e" fill-opacity=".78" stroke="#9fe0ff" stroke-opacity=".42"/>
      <circle cx="34" cy="48" r="18" fill="#b9a7ff" fill-opacity=".18" stroke="#b9a7ff"/>
      <text x="25" y="54" fill="#b9a7ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">C</text>
      <text x="70" y="54" fill="#f0fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="600">CLAUDE</text>
      <text x="216" y="31" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">5h remaining</text>
      <text x="542" y="31" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">100%</text>
      <rect x="216" y="40" width="362" height="18" rx="6" fill="#071b25" stroke="#b9a7ff"/>
      <rect x="218" y="42" width="358" height="14" rx="5" fill="#b9a7ff" fill-opacity=".34"/>
      <text x="600" y="31" fill="#9fd5df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">5H RESET</text>
      <text x="600" y="54" fill="#f0fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">now</text>
      <text x="216" y="75" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Weekly remaining</text>
      <text x="542" y="75" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">99%</text>
    </g>

    <g transform="translate(110 386)">
      <rect width="694" height="96" rx="12" fill="#08141e" fill-opacity=".78" stroke="#9fe0ff" stroke-opacity=".42"/>
      <circle cx="34" cy="48" r="18" fill="#76f29b" fill-opacity=".18" stroke="#76f29b"/>
      <text x="23" y="54" fill="#76f29b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">O</text>
      <text x="70" y="54" fill="#f0fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="600">CODEX</text>
      <text x="216" y="31" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">5h remaining</text>
      <text x="542" y="31" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">98%</text>
      <rect x="216" y="40" width="362" height="18" rx="6" fill="#071b25" stroke="#76f29b"/>
      <rect x="218" y="42" width="351" height="14" rx="5" fill="#76f29b" fill-opacity=".35"/>
      <text x="600" y="31" fill="#9fd5df" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">5H RESET</text>
      <text x="600" y="54" fill="#f0fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">2h 59m</text>
      <text x="216" y="75" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Weekly remaining</text>
      <text x="542" y="75" fill="#ccecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">73%</text>
    </g>
  </g>
</svg>
