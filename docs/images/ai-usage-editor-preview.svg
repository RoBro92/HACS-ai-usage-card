<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI Usage Banner Card visual editor preview</title>
  <desc id="desc">A Home Assistant visual editor panel with Gemini and Codex toggles and default entity mappings.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050b11"/>
      <stop offset="1" stop-color="#101923"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity=".32"/>
    </filter>
  </defs>
  <rect width="1200" height="620" fill="url(#page)"/>
  <g filter="url(#shadow)">
    <rect x="250" y="58" width="700" height="504" rx="10" fill="#101923" stroke="#254052"/>
    <text x="286" y="108" fill="#e7f3fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="650">AI Usage Banner Card editor</text>
    <text x="286" y="137" fill="#9fb4c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Preset toggles create rows with logos, accents, and MQTT entity IDs.</text>

    <text x="286" y="184" fill="#9fb4c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Title</text>
    <rect x="286" y="196" width="284" height="42" rx="8" fill="#07111a" stroke="#39536a"/>
    <text x="303" y="223" fill="#e7f3fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">AI Usage</text>
    <text x="596" y="184" fill="#9fb4c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Alignment</text>
    <rect x="596" y="196" width="156" height="42" rx="8" fill="#07111a" stroke="#39536a"/>
    <text x="613" y="223" fill="#e7f3fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">left</text>

    <g transform="translate(286 270)">
      <rect width="628" height="120" rx="10" fill="#0b151f" stroke="#39536a"/>
      <rect x="22" y="22" width="26" height="26" rx="5" fill="#54f2ef"/>
      <path d="M28 35l5 5 12-14" fill="none" stroke="#07111a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="68" y="37" fill="#e7f3fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="650">Gemini</text>
      <text x="68" y="62" fill="#9fb4c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Create the Gemini row with logo and default MQTT entities.</text>
      <text x="68" y="94" fill="#9fb4c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">5h remaining</text>
      <text x="190" y="94" fill="#dcecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">sensor.ai_allowance_monitor_agy_gemini_5h_remaining</text>
    </g>

    <g transform="translate(286 414)">
      <rect width="628" height="120" rx="10" fill="#0b151f" stroke="#39536a"/>
      <rect x="22" y="22" width="26" height="26" rx="5" fill="#76f29b"/>
      <path d="M28 35l5 5 12-14" fill="none" stroke="#07111a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="68" y="37" fill="#e7f3fb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="650">Codex</text>
      <text x="68" y="62" fill="#9fb4c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Create the Codex row with logo and default MQTT entities.</text>
      <text x="68" y="94" fill="#9fb4c6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">weekly reset</text>
      <text x="190" y="94" fill="#dcecf5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">sensor.ai_allowance_monitor_codex_gpt_weekly_reset</text>
    </g>
  </g>
</svg>
